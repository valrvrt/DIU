<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUNE: Imperium Uprising</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ═══════════ SETUP OVERLAY ═══════════ -->
<div id="setup-overlay" class="overlay">
  <div class="setup-box">
    <h1>⚔ DUNE: IMPERIUM UPRISING</h1>
    <div class="setup-field">
      <label>Your Name</label>
      <input id="setup-name" type="text" value="Player" maxlength="20">
    </div>
    <div class="setup-field">
      <label>Players</label>
      <div class="btn-group">
        <button class="count-btn active" data-count="3">3 Players</button>
        <button class="count-btn" data-count="4">4 Players</button>
      </div>
    </div>
    <div class="setup-field">
      <label>Leader</label>
      <div id="leader-picker" class="leader-picker">
        <div class="leader-loading">Loading leaders…</div>
      </div>
    </div>
    <button id="start-btn" class="btn-primary">Start Game</button>
  </div>
</div>

<!-- ═══════════ OBJECTIVE MODAL ═══════════ -->
<div id="objective-modal" class="overlay hidden">
  <div class="modal-box">
    <div class="modal-title">🎯 YOUR OBJECTIVE</div>
    <div id="objective-content" class="objective-content"></div>
    <button class="btn-primary" onclick="closeObjective()">Start Playing</button>
  </div>
</div>

<!-- ═══════════ CHOICE MODAL ═══════════ -->
<div id="choice-modal" class="overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="choice-title">Choose an option</div>
    <div class="modal-desc" id="choice-desc"></div>
    <div id="choice-options" class="choice-options"></div>
    <button class="btn-secondary" id="choice-cancel" style="display:none">Cancel</button>
  </div>
</div>

<!-- ═══════════ DISCARD MODAL ═══════════ -->
<div id="discard-modal" class="overlay hidden">
  <div class="modal-box wide">
    <div class="modal-title" id="discard-title">Discard Pile</div>
    <div id="discard-cards" class="card-fan"></div>
    <button class="btn-secondary" onclick="closeDiscard()">Close</button>
  </div>
</div>

<!-- ═══════════ GAME OVER OVERLAY ═══════════ -->
<div id="gameover-overlay" class="overlay hidden">
  <div class="modal-box gameover-box">
    <div id="gameover-title" class="gameover-title">⚔ GAME OVER ⚔</div>
    <div id="gameover-subtitle" class="gameover-subtitle"></div>
    <div id="gameover-scores" class="gameover-scores"></div>
    <button class="btn-primary" onclick="location.reload()">New Game</button>
  </div>
</div>

<!-- ═══════════ COMBAT RESULT TOAST ═══════════ -->
<div id="combat-toast" class="combat-toast hidden"></div>

<!-- ═══════════ MAIN GAME LAYOUT ═══════════ -->
<div id="game" class="game hidden">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="round-info">
      <span id="round-label">Round 1</span>
      <span class="phase-badge" id="phase-badge">Agent Phase</span>
    </div>
    <div id="opponents-bar" class="opponents-bar"></div>
    <div class="top-right">
      <button class="btn-icon" onclick="showFullState()" title="Stats">📊</button>
    </div>
  </div>

  <!-- MAIN AREA: center + imperium (factions integrated as bottom row) -->
  <div class="main-area">

    <!-- CENTER: All board sections + faction row -->
    <div class="board-center">

      <!-- Row 1: Landsraad + Shipping aside -->
      <div class="center-row landsraad-row">
        <div class="neutral-group">
          <div class="group-label"><i class="grp-icon landsraad-icon"></i>LANDSRAAD</div>
          <div class="space-grid" id="spaces-landsraad"></div>
        </div>
        <div class="neutral-group shipping-aside">
          <div class="group-label"><i class="grp-icon ship-icon"></i>TRADE</div>
          <div class="space-grid" id="spaces-shipping"></div>
          <div class="contract-panel-header">📋 CONTRACTS</div>
          <div id="contract-display" class="contract-display-panel"></div>
        </div>
      </div>

      <!-- Row 2: Cities -->
      <div class="center-row">
        <div class="neutral-group full-width">
          <div class="group-label"><i class="grp-icon city-icon"></i>CITIES</div>
          <div class="space-grid" id="spaces-city"></div>
        </div>
      </div>

      <!-- Row 3: Desert + Combat side by side -->
      <div class="center-row desert-combat-row">
        <div class="neutral-group">
          <div class="group-label"><i class="grp-icon desert-icon"></i>DESERT</div>
          <div class="space-grid" id="spaces-desert"></div>
        </div>
        <!-- Combat zone (compact) -->
        <div class="combat-zone">
          <div id="current-conflict" class="conflict-display"></div>
          <div id="combat-players" class="combat-players"></div>
          <div id="garrisons" class="garrisons"></div>
        </div>
      </div>

      <!-- Row 4: Faction sections (horizontal) -->
      <div class="center-row faction-row">

        <div class="faction-section-h" id="faction-fremen">
          <div class="faction-header fremen">
            <span class="faction-icon">🌵</span>
            <span class="faction-name">FREMEN</span>
          </div>
          <div class="influence-col" id="inf-fremen"></div>
          <div class="faction-spaces" id="spaces-fremen"></div>
        </div>

        <div class="faction-section-h" id="faction-bene_gesserit">
          <div class="faction-header bene_gesserit">
            <span class="faction-icon">🔮</span>
            <span class="faction-name">BENE GESSERIT</span>
          </div>
          <div class="influence-col" id="inf-bene_gesserit"></div>
          <div class="faction-spaces" id="spaces-bene_gesserit"></div>
        </div>

        <div class="faction-section-h" id="faction-spacing_guild">
          <div class="faction-header spacing_guild">
            <span class="faction-icon">🚀</span>
            <span class="faction-name">SPACING GUILD</span>
          </div>
          <div class="influence-col" id="inf-spacing_guild"></div>
          <div class="faction-spaces" id="spaces-spacing_guild"></div>
        </div>

        <div class="faction-section-h" id="faction-emperor">
          <div class="faction-header emperor">
            <span class="faction-icon">👑</span>
            <span class="faction-name">EMPEROR</span>
          </div>
          <div class="influence-col" id="inf-emperor"></div>
          <div class="faction-spaces" id="spaces-emperor"></div>
        </div>

      </div><!-- end faction-row -->

    </div><!-- end board-center -->

    <!-- RIGHT: Imperium row -->
    <div class="imperium-column">
      <div class="imperium-scroll">
        <div class="section-header">IMPERIUM ROW</div>
        <div id="imperium-row" class="imperium-cards"></div>
        <div class="section-header" style="margin-top:6px">RESERVE</div>
        <div id="reserve-piles" class="reserve-piles"></div>
      </div>
      <div id="event-log" class="event-log"></div>
    </div>

  </div><!-- end main-area -->

  <!-- BOTTOM: Player area -->
  <div class="player-area">
    <div class="player-area-left">
      <div class="hand-header">
        <span id="your-name-label">YOUR HAND</span>
        <span id="persuasion-display" class="persuasion-badge hidden"></span>
        <button id="reveal-btn" class="btn-phase-action hidden" onclick="doReveal()" title="Reveal hand (R)">👁 Reveal</button>
        <button id="end-acq-btn" class="btn-phase-action acq hidden" onclick="endAcquisition()" title="End acquisition (D)">✓ Done</button>
        <button id="end-combat-btn" class="btn-phase-action combat hidden" onclick="endCombat()" title="Resolve the conflict (C)">⚔ Resolve Combat</button>
        <button id="obj-btn" class="btn-icon" onclick="showObjective()" title="Objective">🎯</button>
      </div>
      <div id="action-hint" class="action-hint"></div>
      <div id="player-resources" class="player-resources-bar"></div>
      <div id="hand-cards" class="hand-cards"></div>
    </div>
    <div class="player-area-mid">
      <div class="intrigue-header">🃏 <span id="intrigue-count" class="badge">0</span></div>
      <div id="intrigue-cards" class="intrigue-cards"></div>
    </div>
    <div class="player-area-right">
      <div class="contracts-header">📋 CONTRACTS</div>
      <div id="active-contracts" class="active-contracts"></div>
      <div class="discard-piles-header">DISCARDS</div>
      <div id="discard-piles-strip" class="discard-piles-strip"></div>
    </div>
  </div>

</div><!-- end #game -->

<script src="/static/app.js"></script>
</body>
</html>
